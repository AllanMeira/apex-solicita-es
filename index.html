<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#060d1a" />
    <title>Apex Solicitações — Alpes Mídia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script>
  (function() {
    try {
      // Limpa apenas resíduos comprovadamente problemáticos de versões antigas.
      // Preserva 'apex-session' e 'apex-profile' da versão atual.
      var legacyKeys = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (!k) continue;
        // Remove apenas chaves do padrão antigo sb-* (Supabase v1)
        // que NÃO sejam relacionadas ao projeto atual.
        if (k.indexOf('sb-bofdapvhuehc1hdmkpsu-auth-token-code-verifier-old') === 0) {
          legacyKeys.push(k);
        }
      }
      legacyKeys.forEach(function(k) { localStorage.removeItem(k); });
    } catch(e) {}
  })();
</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
