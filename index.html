<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#060d1a" />
    <title>Apex Solicitações — Alpes Mídia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script>
  (function() {
    try {
      var keep = { 'apex-session': true, 'apex-profile': true };
      var toRemove = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && !keep[k] && (
          k.startsWith('apex-') ||
          k.startsWith('sb-') ||
          k.indexOf('supabase') !== -1
        )) {
          toRemove.push(k);
        }
      }
      toRemove.forEach(function(k) { localStorage.removeItem(k); });
    } catch(e) {}
  })();
</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
